<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Pages</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #F7F4EF;
      color: #2C2C2A;
      min-height: 100vh;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
    }

    .header {
      margin-bottom: 2.8rem;
    }

    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #A89F93;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      color: #1B2C4A;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .header-title em {
      font-style: italic;
      color: #7A9AC0;
    }

    .header-sub {
      font-size: 14px;
      color: #8A8479;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #D9D2C8;
      border-radius: 2px;
      margin: 1.6rem 0 2rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #B0A89C;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      display: block;
      text-decoration: none;
      border-radius: 16px;
      padding: 1.4rem 1.5rem;
      border: 1.5px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.12;
      transform: translate(20px, -20px);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .card:active { transform: translateY(0); }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .card-desc {
      font-size: 12.5px;
      line-height: 1.55;
      opacity: 0.75;
    }

    .card-arrow {
      position: absolute;
      bottom: 1.2rem;
      right: 1.3rem;
      font-size: 14px;
      opacity: 0.35;
      transition: opacity 0.15s, transform 0.15s;
    }

    .card:hover .card-arrow {
      opacity: 0.65;
      transform: translate(2px, -2px);
    }

    /* Accent themes */
    .accent-teal {
      background: #EAF5F0;
      border-color: #C2E2D6;
      color: #0F5040;
    }
    .accent-teal .card-icon { background: #C2E2D6; }
    .accent-teal::before { background: #1D9E75; }

    .accent-blue {
      background: #EBF2FA;
      border-color: #C2D8EF;
      color: #0C3A6B;
    }
    .accent-blue .card-icon { background: #C2D8EF; }
    .accent-blue::before { background: #378ADD; }

    .accent-amber {
      background: #FDF4E7;
      border-color: #F5DDA8;
      color: #6B3E0A;
    }
    .accent-amber .card-icon { background: #F5DDA8; }
    .accent-amber::before { background: #EF9F27; }

    .accent-coral {
      background: #FBF0EC;
      border-color: #F5CBBB;
      color: #6B2A12;
    }
    .accent-coral .card-icon { background: #F5CBBB; }
    .accent-coral::before { background: #D85A30; }

    .accent-purple {
      background: #F2F0FE;
      border-color: #D4CFFA;
      color: #2E2570;
    }
    .accent-purple .card-icon { background: #D4CFFA; }
    .accent-purple::before { background: #7F77DD; }

    .accent-green {
      background: #EFF6E5;
      border-color: #CCDFA9;
      color: #2A4D10;
    }
    .accent-green .card-icon { background: #CCDFA9; }
    .accent-green::before { background: #639922; }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: #EFECE6;
      border-radius: 16px;
      border: 1.5px dashed #D4CCC2;
      color: #A89F93;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer {
      margin-top: 3.5rem;
      font-size: 12px;
      color: #C0B8B0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer::before {
      content: '';
      flex: 1;
      height: 1px;
      background: #E0DAD2;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-eyebrow">Your personal space</div>
      <h1 class="header-title">Pocket <em>Pages</em></h1>
      <p class="header-sub">Tools &amp; references built with Claude, hosted here — always one tap away.</p>
    </header>

    <div class="divider"></div>

    <div class="section-label">Pages</div>
    <div class="grid" id="pages-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      Nothing here yet.<br>Ask Claude to build something and it'll appear right here.
    </div>

    <div class="footer">built with Claude</div>
  </div>

  <script>
    const accents = ['accent-teal','accent-blue','accent-amber','accent-coral','accent-purple','accent-green'];
    const icons = ['🧺','📊','📝','🔧','📅','💡','🗂','⚡','🎯','📌'];

    const pages = [
      { title: "Laundry Guide", desc: "Wash categories, detergent dosing, washer & dryer settings for every load type.", href: "pages/laundry-guide.html", icon: "🧺", accent: "accent-teal" },
    ];

    const grid = document.getElementById('pages-grid');
    const empty = document.getElementById('empty-state');

    if (pages.length > 0) {
      pages.forEach((p, i) => {
        const accent = p.accent || accents[i % accents.length];
        const icon = p.icon || icons[i % icons.length];
        const a = document.createElement('a');
        a.className = `card ${accent}`;
        a.href = p.href;
        a.innerHTML = `
          <div class="card-icon">${icon}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-arrow">↗</div>
        `;
        grid.appendChild(a);
      });
    } else {
      empty.style.display = 'block';
    }
  </script>
</body>
</html>
